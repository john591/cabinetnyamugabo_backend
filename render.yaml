services:
  - type: web
    name: cabinetnyamugabo
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn cabinetnyamugabo.wsgi:application"
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: "cabinetnyamugabo.onrender.com"
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: "https://cabinenyamugabo.vercel.app,https://cabinetnyamugabo.vercel.app"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://cabinenyamugabo.vercel.app,https://cabinetnyamugabo.vercel.app"
      - key: FRONTEND_BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: cabinetnyamugabo-db
          property: connectionString

databases:
  - name: cabinetnyamugabo-db
    plan: free
