{% extends "base.html" %}

{% block title %}Blog | Cabinet Nyamugabo{% endblock %}

{% block content %}
<h2>Blog</h2>
<div class="grid">
    {% for post in posts %}
        <article class="card">
            <h3><a href="{{ post.get_absolute_url }}">{{ post.title }}</a></h3>
            <p class="muted">{{ post.published_at|date:"M d, Y" }}</p>
            <p>{{ post.summary }}</p>
        </article>
    {% empty %}
        <p>No published posts available yet.</p>
    {% endfor %}
</div>
{% endblock %}
