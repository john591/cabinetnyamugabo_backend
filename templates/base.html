<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Cabinet Nyamugabo{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f1e8;
            color: #1d1d1d;
        }
        header, main, footer {
            max-width: 960px;
            margin: 0 auto;
            padding: 1.5rem;
        }
        nav a {
            margin-right: 1rem;
            color: #7b3f00;
            text-decoration: none;
        }
        .grid {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        }
        .card {
            background: #fffdf9;
            border: 1px solid #d9cdbb;
            border-radius: 12px;
            padding: 1rem;
        }
        form {
            display: grid;
            gap: 0.75rem;
            max-width: 640px;
        }
        input, textarea, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #b9ab97;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            width: fit-content;
            padding: 0.75rem 1.25rem;
            background: #7b3f00;
            color: white;
            border: 0;
            border-radius: 8px;
            cursor: pointer;
        }
        .hero {
            padding: 2rem 0;
        }
        .muted {
            color: #61584d;
        }
    </style>
</head>
<body>
    <header>
        <h1>Cabinet Nyamugabo</h1>
        <nav>
            <a href="{% url 'core:home' %}">Home</a>
            <a href="{% url 'core:about' %}">About</a>
            <a href="{% url 'services:list' %}">Services</a>
            <a href="{% url 'team:list' %}">Team</a>
            <a href="{% url 'blog:list' %}">Blog</a>
            <a href="{% url 'contact:create' %}">Contact</a>
            <a href="{% url 'appointment:create' %}">Appointments</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p class="muted">Django backend foundation for the future React frontend.</p>
    </footer>
</body>
</html>
