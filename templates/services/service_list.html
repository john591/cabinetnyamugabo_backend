{% extends "base.html" %}

{% block title %}Services | Cabinet Nyamugabo{% endblock %}

{% block content %}
<h2>Services</h2>
<div class="grid">
    {% for service in services %}
        <article class="card">
            <h3><a href="{{ service.get_absolute_url }}">{{ service.title }}</a></h3>
            <p>{{ service.short_description }}</p>
        </article>
    {% empty %}
        <p>No services available yet.</p>
    {% endfor %}
</div>
{% endblock %}
